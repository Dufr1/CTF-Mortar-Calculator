<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mortar Calculator</title>

<style>
    body {
        background-color: black;
        color: white;
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    input {
        background-color: #222;
        color: white;
        border: 1px solid #555;
        padding: 5px;
    }

    button {
        background-color: #333;
        color: white;
        border: 1px solid #666;
        padding: 6px 12px;
        cursor: pointer;
    }

    button:hover {
        background-color: #444;
    }
</style>

</head>

<body>

<label>Mortar → Spotter Distance (m)</label><br>
<input type="number" id="mortarSpotter"><br><br>

<label>Spotter → Target Distance (m)</label><br>
<input type="number" id="spotterTarget"><br><br>

<label>Spotter Elevation / Depression to Target (degrees)</label><br>
<input type="number" id="spotterAngle"><br><br>

<button onclick="calculate()">Calculate</button>

<br><br>

<div id="results"></div>

<script>

function calculate() {

    const mortarSpotter =
        parseFloat(document.getElementById("mortarSpotter").value);

    const spotterTarget =
        parseFloat(document.getElementById("spotterTarget").value);

    const spotterAngle =
        parseFloat(document.getElementById("spotterAngle").value);

    const v = 76;
    const g = 9.8;

    // Mortar → Target distance using Pythagoras
    const horizontalRange = Math.sqrt(
        Math.pow(mortarSpotter, 2) +
        Math.pow(spotterTarget, 2)
    );

    // Convert angle to radians
    const angleRad = spotterAngle * (Math.PI / 180);

    // Height difference estimate
    const heightDifference =
        Math.tan(angleRad) * spotterTarget;

    // Ballistic discriminant
    const discriminant =
        Math.pow(v, 4) -
        g * (
            g * Math.pow(horizontalRange, 2) +
            2 * heightDifference * Math.pow(v, 2)
        );

    if (discriminant < 0) {

        document.getElementById("results").innerHTML =
            "Target unreachable.";

        return;
    }

    const sqrtPart = Math.sqrt(discriminant);

    // Low angle
    const lowRad = Math.atan(
        (Math.pow(v, 2) - sqrtPart) /
        (g * horizontalRange)
    );

    // High angle
    const highRad = Math.atan(
        (Math.pow(v, 2) + sqrtPart) /
        (g * horizontalRange)
    );

    const lowDeg = lowRad * (180 / Math.PI);
    const highDeg = highRad * (180 / Math.PI);

    document.getElementById("results").innerHTML = `
        Mortar → Target Range: ${horizontalRange.toFixed(2)} m<br><br>

        Estimated Height Difference:
        ${heightDifference.toFixed(2)} m<br><br>

        Low Angle:
        ${lowDeg.toFixed(2)}°<br><br>

        High Angle:
        ${highDeg.toFixed(2)}°
    `;
}

</script>

</body>
</html>
